<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0D0A04" />
  <title>Upgrade — Glamour</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0A04;
      color: #F5F0E8;
      font-family: 'Poppins', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: #C9A84C;
      letter-spacing: 0.08em;
      text-decoration: none;
      margin-bottom: 2.5rem;
      display: block;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #131009;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-top {
      padding: 2rem 1.75rem 1.5rem;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }

    .tag {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9A7A34;
      margin-bottom: 0.5rem;
    }

    .plan-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #E2C47A;
    }

    .card-bottom {
      padding: 1.5rem 1.75rem 1.75rem;
    }

    ul {
      list-style: none;
      margin-bottom: 1.75rem;
    }

    ul li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.85rem;
      font-weight: 300;
      color: #C8C0A8;
      padding: 0.45rem 0;
    }

    ul li::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #C9A84C;
      flex-shrink: 0;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 0.9rem;
      background: #C9A84C;
      color: #0D0A04;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .cta:hover { background: #E2C47A; }

    .note {
      text-align: center;
      font-size: 0.7rem;
      color: #5A5244;
      margin-top: 1rem;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #3A352C;
      text-align: center;
    }
  </style>
</head>
<body>

  <a href="https://glamourwebsite.com.ng" class="logo">Glamour</a>

  <div class="card">
    <div class="card-top">
      <p class="tag">Upgrade Plan</p>
      <p class="plan-title">All Access</p>
    </div>
    <div class="card-bottom">
      <ul>
        <li>Full access to all platform features</li>
        <li>Earn in Euros &amp; Pounds</li>
        <li>Priority access to campaigns</li>
        <li>Influence building &amp; mentorship</li>
        <li>Priority support</li>
      </ul>
      <a href="https://paystack.shop/pay/upgrade-glamour" class="cta" target="_blank" rel="noopener">
        Upgrade Now
      </a>
      <p class="note">Secure payment · One-time activation</p>
    </div>
  </div>

  <footer>© 2026 Glamour — Where Creativity meets Luxury</footer>

</body>
</html>
