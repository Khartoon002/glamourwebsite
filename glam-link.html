<style>
:root{
  --gold:#C8882A;
  --gold-light:#E8A94A;
  --gold-glow:rgba(200,136,42,.45);
  --cream:#F0ECE4;
  --bg-dark:#0D0A06;
  --bg-mid:#1A1208;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif}

body{
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,136,42,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,136,42,.08) 0%, transparent 60%);
  color: var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
  text-align:center;
}

.box{max-width:420px;width:100%}

/* ── LOGO WORDMARK ── */
.brand-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
  opacity:0;
  animation: fadeUp .5s .0s ease forwards;
}
.brand-icon{
  width:36px;height:36px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow: 0 4px 16px var(--gold-glow);
}
.brand-icon svg{width:20px;height:20px;color:#0D0A06}
.brand-name{
  font-size:22px;
  font-weight:800;
  letter-spacing:.5px;
  color:var(--cream);
}
.brand-name span{color:var(--gold)}

/* ── CHECK CIRCLE ── */
.check{
  width:88px;height:88px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  box-shadow:0 8px 32px var(--gold-glow);
  opacity:0;
  animation: fadeUp .5s .08s ease forwards;
}
.check svg{width:44px;height:44px;color:#0D0A06}

/* ── TIMER PILL ── */
.timer{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(200,136,42,.12);
  border:1px solid rgba(200,136,42,.35);
  color:var(--gold-light);
  padding:8px 16px;
  border-radius:100px;
  font-size:13px;
  font-weight:600;
  margin-bottom:24px;
  opacity:0;
  animation: fadeUp .5s .16s ease forwards;
}
.timer svg{width:14px;height:14px;flex:0 0 auto}

/* ── HEADINGS ── */
h1{
  font-size:32px;
  font-weight:800;
  margin-bottom:12px;
  line-height:1.2;
  letter-spacing:-0.5px;
  color:var(--cream);
  opacity:0;
  animation: fadeUp .5s .22s ease forwards;
}
h1 span{color:var(--gold)}

.sub{
  font-size:17px;
  color:rgba(240,236,228,.8);
  margin-bottom:8px;
  line-height:1.5;
  opacity:0;
  animation: fadeUp .5s .28s ease forwards;
}

/* ── URGENT BADGE ── */
.urgent{
  font-size:15px;
  color:#FFD93D;
  margin-bottom:32px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  opacity:0;
  animation: fadeUp .5s .34s ease forwards;
}
.urgent svg{width:18px;height:18px;flex:0 0 auto}

/* ── CTA BUTTON ── */
.cta{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
  color:#0D0A06;
  padding:22px 24px;
  border-radius:16px;
  font-size:19px;
  font-weight:800;
  text-decoration:none;
  box-shadow:0 6px 28px var(--gold-glow), 0 2px 0 rgba(255,255,255,.08) inset;
  margin-bottom:16px;
  letter-spacing:.3px;
  transition:transform .15s, box-shadow .15s;
  opacity:0;
  animation: fadeUp .5s .40s ease forwards;
}
.cta:active{transform:scale(.98);box-shadow:0 4px 16px var(--gold-glow)}
.cta svg{width:24px;height:24px;flex:0 0 auto}
.cta .arrow{width:20px;height:20px}

/* ── DIVIDER ── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:4px 0 16px;
  opacity:0;
  animation: fadeUp .5s .46s ease forwards;
}
.divider-line{flex:1;height:1px;background:rgba(200,136,42,.2)}
.divider-text{font-size:12px;color:rgba(200,136,42,.5);font-weight:600;letter-spacing:.5px}

/* ── TAGLINE ── */
.tagline{
  font-size:12px;
  color:rgba(240,236,228,.35);
  letter-spacing:.6px;
  font-weight:500;
  text-transform:uppercase;
  margin-top:24px;
  opacity:0;
  animation: fadeUp .5s .52s ease forwards;
}

.warning{
  font-size:13px;
  color:rgba(240,236,228,.5);
  margin-top:8px;
  line-height:1.5;
  opacity:0;
  animation: fadeUp .5s .48s ease forwards;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

#count{font-variant-numeric:tabular-nums}
